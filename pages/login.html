<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — CityCare Hospital</title>
  <meta name="description" content="Login to your CityCare Hospital patient, doctor, or receptionist account.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo"><i class="fas fa-hospital-user"></i></div>
        <h2>Welcome Back</h2>
        <p>Sign in to your CityCare account</p>
      </div>

      <div class="demo-credentials">
        <p><i class="fas fa-info-circle"></i> Demo credentials (password: CityPass@123)</p>
        <div class="demo-btns">
          <button class="demo-btn" onclick="fillDemo('patient@citycare.com')">Patient</button>
          <button class="demo-btn" onclick="fillDemo('drsmith@citycare.com')">Doctor</button>
          <button class="demo-btn" onclick="fillDemo('admin@citycare.com')">Receptionist</button>
        </div>
      </div>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="your@email.com" required autocomplete="email">
          <span class="field-error" id="emailError"></span>
        </div>
        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> Password</label>
          <div class="input-icon-right">
            <input type="password" id="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="toggle-pass" id="togglePass" tabindex="-1"><i class="fas fa-eye"></i></button>
          </div>
          <span class="field-error" id="passError"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
          <span id="loginBtnText"><i class="fas fa-sign-in-alt"></i> Sign In</span>
          <span id="loginBtnLoader" style="display:none"><i class="fas fa-spinner fa-spin"></i> Signing in…</span>
        </button>
      </form>

      <div class="auth-footer">
        <p>Don't have an account? <a href="register.html">Register here</a></p>
        <a href="../index.html" class="back-home"><i class="fas fa-home"></i> Back to Home</a>
      </div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // Demo auto-fill
    function fillDemo(email) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = 'CityPass@123';
    }

    // Password toggle
    document.getElementById('togglePass')?.addEventListener('click', () => {
      const inp = document.getElementById('password');
      const icon = document.querySelector('#togglePass i');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.className = 'fas fa-eye-slash';
      } else {
        inp.type = 'password';
        icon.className = 'fas fa-eye';
      }
    });
  </script>
</body>
</html>
